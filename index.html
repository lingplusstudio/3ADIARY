<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>每日英文單字自我檢測系統</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; padding: 20px 15px; max-width: 600px; margin: 0 auto; background: #edf2f7; font-size: 18px; }
    h2 { color: #2d3748; text-align: center; font-size: 24px; font-weight: bold; }
    .card { background: white; padding: 20px; margin-bottom: 18px; border-radius: 10px; box-shadow: 0 3px 8px rgba(0,0,0,0.06); position: relative; }
    .card-header { display: flex; justify-content: space-between; color: #616e80; font-size: 15px; margin-bottom: 12px; border-bottom: 1px solid #edf2f7; padding-bottom: 8px; font-weight: 500; }
    .score { font-weight: bold; color: #e65c00; font-size: 18px; }
    .msg { font-size: 18px; line-height: 1.6; color: #2d3748; white-space: pre-wrap; margin-bottom: 15px; letter-spacing: 0.5px; }
    
    /* 按鈕群組：在手機上會自動放大填滿，更好按 */
    .btn-group { display: flex; gap: 10px; justify-content: space-between; border-top: 1px dashed #e2e8f0; padding-top: 15px; }
    .btn { flex: 1; text-align: center; padding: 12px 8px; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; font-weight: bold; transition: 0.2s; }
    .btn-reply { background: #3182ce; color: white; }
    .btn-reply:hover { background: #2b6cb0; }
    .btn-edit { background: #dd6b20; color: white; }
    .btn-edit:hover { background: #c05621; }
    .btn-delete { background: #e53e3e; color: white; }
    .btn-delete:hover { background: #c53030; }
    
    /* 回覆與備註顯示放大 */
    .reply-box { background: #f7fafc; border-left: 4px solid #3182ce; padding: 12px 15px; margin-top: 12px; font-size: 16px; color: #2d3748; border-radius: 0 6px 6px 0; line-height: 1.5; }
  </style>
</head>
<body>

  <h3>每日進度複習打卡</h3>
  <div class="desc">專案代號：Daily-Vocab-Check</div>

  <p style="font-size:14px; text-align:center; margin-bottom:10px;">請評估今日學習狀態值 (1-5)：</p>
  <div class="score-group">
    <button class="score-btn" onclick="selectScore(1)">1</button>
    <button class="score-btn" onclick="selectScore(2)">2</button>
    <button class="score-btn" onclick="selectScore(3)">3</button>
    <button class="score-btn" onclick="selectScore(4)">4</button>
    <button class="score-btn" onclick="selectScore(5)">5</button>
  </div>

  <textarea id="message" placeholder="輸入今日複習摘要或備忘事項..."></textarea>
  <button class="submit-btn" onclick="sendToFirebase()">儲存並上傳進度</button>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <script>
    // ⚠️ 這裡請貼上你剛剛在 Firebase 複製的專屬設定值
    const firebaseConfig = {
     apiKey: "AIzaSyBSW3kCmsW5-8KNGGg2KqRv5WonnTOuBNg",
    authDomain: "aaadiary-840a0.firebaseapp.com",
    projectId: "aaadiary-840a0",
    storageBucket: "aaadiary-840a0.firebasestorage.app",
    messagingSenderId: "803863119198",
    appId: "1:803863119198:web:e00e660c986b438f037bcf",
    measurementId: "G-4BCBBEKB03"
    };

    // 初始化 Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let selectedScore = null;

    function selectScore(score) {
      selectedScore = score;
      const btns = document.querySelectorAll('.score-btn');
      btns.forEach((btn, idx) => {
        if (idx === score - 1) btn.classList.add('active');
        else btn.classList.remove('active');
      });
    }

    function sendToFirebase() {
      const msg = document.getElementById('message').value;
      if (!selectedScore) { alert('請選取今日進度值'); return; }

      document.querySelector('.submit-btn').innerText = '正在同步...';
      document.querySelector('.submit-btn').disabled = true;

      // 將資料寫入 Firebase 的 logs 集合中
      db.collection("logs").add({
        score: selectedScore,
        message: msg,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      })
      .then(() => {
        // 【核心防護】寫入成功立刻清空所有前端暫存
        selectedScore = null;
        document.getElementById('message').value = '';
        
        // 瞬間重新導向到 Google 首頁，徹底湮滅證據
        window.location.href = "https://www.google.com";
      })
      .catch((error) => {
        alert("同步失敗，請稍後再試");
        document.querySelector('.submit-btn').innerText = '儲存並上傳進度';
        document.querySelector('.submit-btn').disabled = false;
      });
    }
  </script>
</body>
</html>
