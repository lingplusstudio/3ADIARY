<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>每日英文單字自我檢測系統</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 25px; max-width: 420px; margin: 0 auto; background: #fdfdfd; color: #444; }
    h3 { text-align: center; color: #555; font-weight: normal; margin-bottom: 5px; }
    .desc { font-size: 13px; color: #888; text-align: center; margin-bottom: 25px; }
    .score-group { display: flex; justify-content: space-between; margin: 20px 0; }
    .score-btn { width: 52px; height: 52px; border-radius: 50%; border: 1px solid #ddd; background: #fff; font-size: 18px; cursor: pointer; transition: 0.2s; }
    .score-btn.active { background: #4a5568; color: white; border-color: #4a5568; }
    textarea { width: 100%; height: 130px; box-sizing: border-box; padding: 12px; border: 1px solid #ddd; border-radius: 6px; resize: none; font-size: 16px; background: #fafafa; }
    button.submit-btn { width: 100%; padding: 14px; background: #3182ce; color: white; border: none; border-radius: 6px; font-size: 16px; margin-top: 15px; cursor: pointer; font-weight: bold; }
  </style>
</head>
<body>

  <h3>每日進度複習打卡</h3>
  <div class="desc">專案代號：Daily-Vocab-Check</div>

  <p style="font-size:14px; text-align:center; margin-bottom:10px;">請評估今日學習狀態值 (1-5)：</p>
  <div class="score-group">
    <button class="score-btn" onclick="selectScore(1)">1</button>
    <button class="score-btn" onclick="selectScore(2)">2</button>
    <button class="score-btn" onclick="selectScore(3)">3</button>
    <button class="score-btn" onclick="selectScore(4)">4</button>
    <button class="score-btn" onclick="selectScore(5)">5</button>
  </div>

  <textarea id="message" placeholder="輸入今日複習摘要或備忘事項..."></textarea>
  <button class="submit-btn" onclick="sendToFirebase()">儲存並上傳進度</button>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <script>
    // ⚠️ 這裡請貼上你剛剛在 Firebase 複製的專屬設定值
    const firebaseConfig = {
     apiKey: "AIzaSyBSW3kCmsW5-8KNGGg2KqRv5WonnTOuBNg",
    authDomain: "aaadiary-840a0.firebaseapp.com",
    projectId: "aaadiary-840a0",
    storageBucket: "aaadiary-840a0.firebasestorage.app",
    messagingSenderId: "803863119198",
    appId: "1:803863119198:web:e00e660c986b438f037bcf",
    measurementId: "G-4BCBBEKB03"
    };

    // 初始化 Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let selectedScore = null;

    function selectScore(score) {
      selectedScore = score;
      const btns = document.querySelectorAll('.score-btn');
      btns.forEach((btn, idx) => {
        if (idx === score - 1) btn.classList.add('active');
        else btn.classList.remove('active');
      });
    }

    function sendToFirebase() {
      const msg = document.getElementById('message').value;
      if (!selectedScore) { alert('請選取今日進度值'); return; }

      document.querySelector('.submit-btn').innerText = '正在同步...';
      document.querySelector('.submit-btn').disabled = true;

      // 將資料寫入 Firebase 的 logs 集合中
      db.collection("logs").add({
        score: selectedScore,
        message: msg,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      })
      .then(() => {
        // 【核心防護】寫入成功立刻清空所有前端暫存
        selectedScore = null;
        document.getElementById('message').value = '';
        
        // 瞬間重新導向到 Google 首頁，徹底湮滅證據
        window.location.href = "https://www.google.com";
      })
      .catch((error) => {
        alert("同步失敗，請稍後再試");
        document.querySelector('.submit-btn').innerText = '儲存並上傳進度';
        document.querySelector('.submit-btn').disabled = false;
      });
    }
  </script>
</body>
</html>
